# readaloud config — copy to config.toml (gitignored) or just let the app create it.
# READ_ALOUD_VOICE pins the voice at runtime (shell-alias parity); it wins over
# default_voice below.

sample_text = "The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs."

# kokoro is the only engine (local, offline, private).
# a=US, b=UK, e=ES; f/m = female/male. The *_latam ids re-accent the Spanish voices
# (ef_dora / em_alex / em_santa) to Latin-American Spanish (seseo + yeísmo) via espeak
# es-419. Drop the _latam suffix for Castilian.
default_voice = "af_heart"
voices = ["af_heart", "af_bella", "af_nicole", "am_michael", "am_fenrir", "bf_emma", "bm_george", "ef_dora_latam", "em_alex_latam", "em_santa_latam"]
